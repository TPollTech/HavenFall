<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Baixe HavenFall Desktop para Windows." />
  <title>Baixar HavenFall</title>
  <link rel="icon" type="image/png" href="../logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="landing" id="top">
    <header class="brand-row" aria-label="HavenFall">
      <img src="../logo.png" alt="HavenFall" />
      <strong>HavenFall</strong>
    </header>

    <section class="hero" aria-labelledby="hero-title">
      <div class="copy">
        <p class="tag">Jogo desktop para Windows</p>
        <h1 id="hero-title">Baixe HavenFall</h1>
        <p class="description">
          HavenFall é um jogo de sobrevivência e gerenciamento de colônia. Você lidera colonos em um mundo hostil,
          coleta recursos, constrói abrigo e tenta manter todos vivos.
        </p>

        <a class="download-button" id="downloadButton" href="downloads/HavenFall-Desktop-portable.exe" download>
          Baixar jogo
        </a>

        <p class="file-line">
          <span id="fileNameLabel">HavenFall-Desktop-portable.exe</span>
          <span>Windows · versão <b id="versionLabel">1.7.0</b></span>
        </p>
      </div>

      <div class="preview" aria-label="Imagem do HavenFall">
        <img src="../menu.png" alt="Arte de apresentação do HavenFall" />
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
